{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Upload Lab Exam</h2>

    <div class="patient-info-grid">
        <div><strong>Name:</strong> {{ patient.full_name }}</div>
        <div><strong>National ID:</strong> {{ patient.national_id }}</div>
        <div><strong>Sex:</strong> {{ patient.sex if patient.sex else "-" }}</div>
        <div><strong>Age:</strong> {{ age if age is not none else "-" }}</div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="form-grid" style="margin-top: 24px;">
        <div class="form-group full-width">
            <label>Exam Date</label>
            <input type="date" name="exam_date" required>
        </div>

        <div class="form-group full-width">
            <label>Upload Image or PDF</label>
            <input type="file" name="file" accept=".png,.jpg,.jpeg,.bmp,.webp,.pdf" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">Process File</button>
        </div>
    </form>
</div>
{% endblock %}
